# game.toml — Pokémon Ruby Version (GBA), USA rev1
#
# Sibling variant of ../sapphire/. Both share the pokeruby decomp
# (different GAME_VERSION build target). On-disk Ruby dump is rev1
# (sha1 610b96a9…), so this variant targets the ruby_rev1 decomp build.
# Paths resolve relative to THIS file's directory (variants/ruby/).

[game]
name           = "Pokémon Ruby Version"
short_name     = "ruby"
default_region = "usa"

[bios]
path = "../../../gbarecomp/bios/gba_bios.bin"   # override via --bios
sha1 = "300c20df6731a33952ded8c436f7f186d25d3492"

[rom]
path = "roms/ruby_usa.gba"   # user-provided; gitignored (rev1, 610b96a9…)

[recompiler]
entry_point   = "0x08000000"
seeds         = "symbols/imported_symbols.tsv"
boundaries    = "symbols/function_boundaries.tsv"
out_dir       = "generated"
strict        = true

[save]
type = "flash1m"          # Ruby: 1 Mbit (128 KB) flash + RTC

[runtime]
debug_port    = 19872
window_title  = "RubyRecomp"

[functions]
arm   = []
thumb = []
