# game.toml — Pokémon Sapphire Version (GBA), USA rev1
#
# Sibling variant of ../ruby/. Both share the pokeruby decomp (different
# GAME_VERSION build target). On-disk Sapphire dump is rev1
# (sha1 4722efb8…), so this variant targets the sapphire_rev1 decomp build.
# Paths resolve relative to THIS file's directory (variants/sapphire/).

[game]
name           = "Pokémon Sapphire Version"
short_name     = "sapphire"
default_region = "usa"

[bios]
path = "../../../gbarecomp/bios/gba_bios.bin"   # override via --bios
sha1 = "300c20df6731a33952ded8c436f7f186d25d3492"

[rom]
path = "roms/sapphire_usa.gba"   # user-provided; gitignored (rev1, 4722efb8…)

[recompiler]
entry_point   = "0x08000000"
seeds         = "symbols/imported_symbols.tsv"
boundaries    = "symbols/function_boundaries.tsv"
out_dir       = "generated"
strict        = true

[save]
type = "flash1m"          # Sapphire: 1 Mbit (128 KB) flash + RTC

[runtime]
debug_port    = 19882
window_title  = "SapphireRecomp"

[functions]
arm   = []
thumb = []
